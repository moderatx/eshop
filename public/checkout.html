<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Review your items and complete your purchase at MOON SENCE.">
  <title>Checkout - MOON SENCE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Staatliches&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-brand">MOON SENCE</a>
      <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/products.html">Collection</a>
      </div>
    </div>
  </nav>

  <div style="height: 72px;"></div>

  <section class="section">
    <div class="container" style="max-width: 800px;">
      <div class="section-header" style="text-align: left; margin-bottom: 40px;">
        <p class="section-label">Final Step</p>
        <h2 class="section-title">Review Your Order</h2>
      </div>

      <div id="checkoutItems" style="margin-bottom: 40px;">
        <!-- Items rendered here -->
      </div>

      <div style="border-top: 1px solid var(--color-gray-100); padding-top: 30px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
          <div>
            <p style="font-size: 0.875rem; color: var(--color-gray-400); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 4px;">Grand Total</p>
            <h3 id="checkoutTotal" style="font-size: 2rem; font-weight: 700;">$0.00</h3>
          </div>
          <button id="paypalButton" class="btn-primary btn-primary--dark" style="height: 60px; padding: 0 40px;">
            Pay with PayPal
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-left: 10px;"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          </button>
        </div>
      </div>

      <a href="/products.html" style="display: block; text-align: center; color: var(--color-gray-400); font-size: 0.8125rem; text-decoration: none; margin-top: 40px;">
        Return to Shopping
      </a>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-divider" style="margin-top: 0;"></div>
      <div class="footer-bottom">
        <span>2026 MOON SENCE. All rights reserved.</span>
        <span>Secured by PayPal</span>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
