<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View product details and purchase premium club wear.">
  <title>Product Detail - MOON SENCE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Staatliches&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-brand">MOON SENCE</a>
      <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/products.html">Collection</a>
        <a href="/orders.html">Orders</a>
        <a href="/admin.html">Studio</a>
      </div>
      <div class="nav-mobile-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <div style="height: 72px;"></div>

  <section class="section" style="padding-top: 40px;">
    <div class="container">
      <a href="/products.html" style="display: inline-flex; align-items: center; gap: 8px; font-size: 0.8125rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--color-gray-400); margin-bottom: 40px; transition: color 0.2s;">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Collection
      </a>
      <div class="product-detail" id="productDetail">
        <div class="product-detail-image" id="productImage">
          <div class="loading-skeleton" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></div>
        </div>
        <div class="product-detail-info">
          <p class="product-detail-label" id="productLabel">Loading...</p>
          <h1 class="product-detail-name" id="productName"></h1>
          <div class="product-detail-price" id="productPrice"></div>
          <div class="product-detail-divider"></div>
          <p class="product-detail-description" id="productDescription"></p>
          <button class="btn-primary btn-primary--dark" id="buyButton" style="opacity: 1; transform: none; width: 100%;" disabled>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
            Buy with PayPal
          </button>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-divider" style="margin-top: 0;"></div>
      <div class="footer-bottom">
        <span>2026 MOON SENCE. All rights reserved.</span>
        <span>Designed with precision</span>
      </div>
    </div>
  </footer>

  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-drawer-header">
      <h3 class="footer-heading" style="margin-bottom: 0;">Your Cart</h3>
      <button class="cart-drawer-close" id="cartClose">&times;</button>
    </div>
    <div class="cart-drawer-content" id="cartDrawerContent"></div>
    <div class="cart-drawer-footer">
      <div class="cart-total" style="display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: 600; font-size: 1.1rem;">
        <span>Total</span>
        <span id="cartDrawerTotal">$0.00</span>
      </div>
      <button class="btn-primary btn-primary--dark" style="width: 100%;" id="drawerCheckoutBtn">Checkout</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
