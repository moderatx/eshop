<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Add new products to the MOON SENCE collection.">
  <title>Studio - MOON SENCE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Staatliches&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <nav class="nav">
    <div class="container nav-inner">
      <a href="/" class="nav-brand">MOON SENCE</a>
      <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/products.html">Collection</a>
        <a href="/orders.html">Orders</a>
        <a href="/admin.html">Studio</a>
      </div>
      <div class="nav-mobile-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <div class="page-header">
    <div class="container">
      <p style="color: var(--color-gray-400); margin-bottom: 16px; font-size: 0.75rem; letter-spacing: 0.3em; text-transform: uppercase; font-weight: 500;">Admin</p>
      <h1 class="page-title">Studio</h1>
      <p class="page-subtitle">Add new pieces to the collection</p>
    </div>
  </div>

  <section class="section" style="padding-top: 80px;">
    <div class="container">
      <div class="form-container">
        <div id="formAlert"></div>
        <form id="productForm">
          <div class="form-group">
            <label class="form-label" for="productNameInput">Product Name</label>
            <input class="form-input" type="text" id="productNameInput" placeholder="e.g. Midnight Sequin Blazer" required>
          </div>
          <div class="form-group">
            <label class="form-label" for="productDescInput">Description</label>
            <textarea class="form-input" id="productDescInput" placeholder="Describe the piece, its fabric, and the vibe it carries..." required></textarea>
          </div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
              <label class="form-label" for="productPriceInput">Price (USD)</label>
              <input class="form-input" type="number" id="productPriceInput" placeholder="0.00" step="0.01" min="0" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="productImgInput">Product Image</label>
              <input class="form-input" type="file" id="productImgInput" accept="image/*" required>
            </div>
          </div>
          <button type="submit" class="btn-primary btn-primary--dark" id="submitProductBtn" style="opacity: 1; transform: none; width: 100%; margin-top: 16px;">
            Add to Collection
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </button>
          <button type="button" class="btn-secondary" id="adminLogoutBtn" style="width: 100%; margin-top: 12px; border-color: transparent; color: var(--color-gray-400);">
            Sign Out
          </button>
        </form>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-divider" style="margin-top: 0;"></div>
      <div class="footer-bottom">
        <span>2026 MOON SENCE. All rights reserved.</span>
        <span>Designed with precision</span>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
